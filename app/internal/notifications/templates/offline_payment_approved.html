<!doctype html>
<html lang="en">
<body style="font-family: -apple-system, system-ui, sans-serif; max-width: 560px; margin: 0 auto; padding: 24px;">
  <h2>Offline payment recorded</h2>
  <p>Hi {{.UserName}},</p>
  <p>A UniScoot operator has recorded an offline payment of <strong>{{.Amount}} {{.Currency}}</strong> for your ride.</p>
  <p>Rental id: <code>{{.RentalID}}</code></p>
  <p>Payment id: <code>{{.PaymentID}}</code></p>
  {{if .Note}}<p>Note: {{.Note}}</p>{{end}}
  <p>Your account is now in good standing.</p>
</body>
</html>
