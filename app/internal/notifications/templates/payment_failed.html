<!doctype html>
<html lang="en">
<body style="font-family: -apple-system, system-ui, sans-serif; max-width: 560px; margin: 0 auto; padding: 24px;">
  <h2>Payment failed</h2>
  <p>Hi {{.UserName}},</p>
  <p>We were unable to charge <strong>{{.Amount}} {{.Currency}}</strong> for your recent UniScoot ride.</p>
  {{if .FailureReason}}<p>Reason: {{.FailureReason}}</p>{{end}}
  <p>Please update your payment method in the app before starting your next ride.</p>
  <p>Payment id: <code>{{.PaymentID}}</code></p>
</body>
</html>
